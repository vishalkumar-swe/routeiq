global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: routeiq
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: routeiq_backend
    static_configs:
      - targets: ['backend:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node_exporter
    static_configs:
      - targets: ['node-exporter:9100']
    honor_labels: true
