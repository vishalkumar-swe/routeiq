---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: routeiq

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: routeiq-config
  namespace: routeiq
data:
  APP_ENV: "production"
  DEBUG: "false"
  ALGORITHM: "HS256"
  DATABASE_POOL_SIZE: "20"

---
# Secret (use external secrets or vault in real prod)
apiVersion: v1
kind: Secret
metadata:
  name: routeiq-secrets
  namespace: routeiq
type: Opaque
stringData:
  SECRET_KEY: "change-me-use-sealed-secrets-in-prod"
  DATABASE_URL: "postgresql+asyncpg://routeiq:pass@postgres-svc:5432/routeiq"
  REDIS_URL: "redis://redis-svc:6379/0"

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: routeiq-backend
  namespace: routeiq
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: routeiq/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: routeiq-config
            - secretRef:
                name: routeiq-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: routeiq
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: routeiq-frontend
  namespace: routeiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: routeiq/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: routeiq
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: routeiq-ingress
  namespace: routeiq
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - app.routeiq.io
      secretName: routeiq-tls
  rules:
    - host: app.routeiq.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80

---
# HorizontalPodAutoscaler for backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: routeiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: routeiq-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
